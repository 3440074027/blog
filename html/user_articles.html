<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>用户公开文章</title>
<style>
  *{box-sizing:border-box}
  body{margin:0;min-height:100vh;color:#fff;font-family:"Microsoft YaHei","PingFang SC","Segoe UI",sans-serif;background:radial-gradient(circle at 12% 8%,rgba(255,143,199,.26),transparent 34%),radial-gradient(circle at 86% 16%,rgba(127,247,255,.2),transparent 36%),linear-gradient(135deg,#11152f,#231a4b 52%,#141832)}
  body::before{content:"";position:fixed;inset:0;pointer-events:none;background-image:radial-gradient(circle,rgba(255,255,255,.28) 0 1px,transparent 1px),radial-gradient(circle,rgba(255,255,255,.18) 0 1px,transparent 1px);background-size:68px 68px,112px 112px;opacity:.45}
  .page{position:relative;z-index:1;width:min(1180px,calc(100vw - 28px));margin:0 auto;padding:28px 0 44px}
  .topbar{display:flex;justify-content:space-between;align-items:center;gap:12px;margin-bottom:18px}
  .back{min-height:38px;padding:0 16px;border-radius:999px;border:1px solid rgba(255,255,255,.2);color:#fff;font-weight:900;cursor:pointer;background:rgba(255,255,255,.12)}
  .hero,.article,.empty{border:1px solid rgba(255,255,255,.18);background:rgba(255,255,255,.11);backdrop-filter:blur(18px);-webkit-backdrop-filter:blur(18px);box-shadow:0 24px 70px rgba(0,0,0,.28),inset 0 1px 0 rgba(255,255,255,.18)}
  .hero{display:grid;grid-template-columns:auto minmax(0,1fr);gap:18px;align-items:center;padding:24px;border-radius:34px}
  .avatar{width:94px;height:94px;border-radius:30px;background:var(--avatar,linear-gradient(135deg,#7c5cff,#ff8fc7));background-size:cover;background-position:center;box-shadow:inset 0 1px 0 rgba(255,255,255,.35),0 20px 44px rgba(0,0,0,.25),0 0 0 5px rgba(255,255,255,.08);position:relative;overflow:hidden}
  .avatar::after{content:"";position:absolute;top:11px;left:13px;width:22px;height:22px;border-radius:50%;background:rgba(255,255,255,.35)}
  h1{margin:0;font-size:clamp(30px,5vw,58px);line-height:1}
  .meta{margin:10px 0 0;color:rgba(255,255,255,.66);font-weight:850}
  .tags{display:flex;flex-wrap:wrap;gap:8px;margin-top:14px}
  .tags span{padding:7px 11px;border-radius:999px;background:rgba(255,255,255,.13);color:#8fceff;font-size:12px;font-weight:900}
  .grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:16px;margin-top:18px}
  .article{min-height:250px;display:grid;grid-template-rows:150px auto;overflow:hidden;border-radius:30px;cursor:pointer;transition:transform .22s,background .22s,box-shadow .22s}
  .article:hover{transform:translateY(-4px);background:rgba(255,255,255,.15);box-shadow:0 28px 76px rgba(0,0,0,.34)}
  .thumb{position:relative;overflow:hidden;background:var(--thumb,linear-gradient(135deg,#7c5cff,#ff8fc7));background-size:cover;background-position:center}
  .thumb-slide{position:absolute;inset:0;opacity:0;background:var(--slide);background-size:cover;background-position:center;animation:thumbCarousel var(--duration,8s) infinite;animation-delay:var(--delay,0s)}
  .thumb-slide:first-child{opacity:1}
  .thumb-dots{position:absolute;left:10px;bottom:9px;z-index:2;display:flex;gap:5px}
  .thumb-dots span{width:6px;height:6px;border-radius:50%;background:rgba(255,255,255,.72)}
  @keyframes thumbCarousel{0%,28%{opacity:1;transform:scale(1)}36%,92%{opacity:0;transform:scale(1.04)}100%{opacity:1;transform:scale(1)}}
  .article-body{padding:16px}
  .article small{color:#8fceff;font-weight:900}
  .article h2{margin:9px 0 8px;font-size:20px}
  .article p{margin:0;color:rgba(255,255,255,.68);font-size:13px;line-height:1.7}
  .empty{margin-top:18px;padding:30px;border-radius:30px;text-align:center;color:rgba(255,255,255,.72)}
  .detail{position:fixed;inset:0;z-index:5;display:grid;place-items:center;padding:18px;background:rgba(8,10,26,.58);backdrop-filter:blur(18px);opacity:0;visibility:hidden;pointer-events:none;transition:.24s}
  .detail.open{opacity:1;visibility:visible;pointer-events:auto}
  .detail-card{width:min(920px,96vw);max-height:90vh;overflow:auto;padding:24px;border-radius:34px;border:1px solid rgba(255,255,255,.22);background:rgba(16,20,48,.95);box-shadow:0 34px 100px rgba(0,0,0,.45)}
  .detail-head{display:flex;justify-content:space-between;gap:12px;align-items:flex-start}
  .detail h2{margin:0;font-size:clamp(26px,4vw,44px)}
  .close{min-height:34px;padding:0 13px;border-radius:999px;border:1px solid rgba(255,255,255,.2);color:#fff;background:rgba(255,255,255,.12);cursor:pointer;font-weight:900}
  .content{margin-top:16px;padding:18px;border-radius:24px;background:rgba(255,255,255,.09);line-height:1.85;color:rgba(255,255,255,.86)}
  .content img{max-width:min(420px,92%);max-height:300px;object-fit:contain;border-radius:18px;margin:8px;border:1px solid rgba(255,255,255,.18)}
  @media (max-width:640px){.hero{grid-template-columns:1fr;text-align:center}.avatar{margin:auto}}
</style>
</head>
<body>
<main class="page">
  <div class="topbar">
    <button class="back" type="button" onclick="history.length>1?history.back():location.href='../index.html'">返回博客首页</button>
    <span class="meta" id="articleCountText">正在读取公开文章...</span>
  </div>
  <section class="hero" id="userHero">
    <div class="avatar"></div>
    <div><h1>用户公开文章</h1><p class="meta">正在加载用户资料...</p></div>
  </section>
  <section class="grid" id="articleGrid"></section>
  <section class="empty" id="emptyState" hidden>这个用户还没有发布公开文章。</section>
</main>
<div class="detail" id="detailModal">
  <div class="detail-card">
    <div class="detail-head">
      <div><div class="meta" id="detailMeta"></div><h2 id="detailTitle">文章标题</h2></div>
      <button class="close" id="detailClose" type="button">关闭</button>
    </div>
    <div class="content" id="detailContent"></div>
  </div>
</div>
<script>
const params = new URLSearchParams(location.search);
const username = params.get('user') || '';
const userHero = document.getElementById('userHero');
const articleGrid = document.getElementById('articleGrid');
const emptyState = document.getElementById('emptyState');
const articleCountText = document.getElementById('articleCountText');
const detailModal = document.getElementById('detailModal');
const detailTitle = document.getElementById('detailTitle');
const detailMeta = document.getElementById('detailMeta');
const detailContent = document.getElementById('detailContent');
function escapeHtml(value){return String(value ?? '').replace(/[&<>"']/g,char=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[char]));}
function avatarStyle(value){return value ? `url("${value}")` : 'linear-gradient(135deg,#7c5cff,#ff8fc7)';}
function galleryImages(article){
  const gallery = Array.isArray(article?.gallery) ? article.gallery : [];
  const images = gallery.filter(src=>typeof src === 'string' && src.startsWith('data:image/')).slice(0,5);
  const thumb = String(article?.thumb || '');
  if(!images.length && thumb.startsWith('data:image/')) images.push(thumb);
  return images;
}
function thumbStyle(article){const thumb = String(article?.thumb || '');return thumb.startsWith('data:image/') ? `url("${thumb}")` : (thumb || 'linear-gradient(135deg,#7c5cff,#ff8fc7)');}
function renderThumb(article){
  const images = galleryImages(article);
  if(!images.length) return `<div class="thumb" style="--thumb:${thumbStyle(article)}"></div>`;
  const duration = Math.max(6, images.length * 2.4);
  return `<div class="thumb" style="--thumb:url('${images[0]}')">${images.map((src,index)=>`<span class="thumb-slide" style="--slide:url('${src}');--duration:${duration}s;--delay:${-(duration / images.length) * index}s"></span>`).join('')}${images.length>1?`<div class="thumb-dots">${images.map(()=>'<span></span>').join('')}</div>`:''}</div>`;
}
async function fetchJson(url){const response = await fetch(url);const data = await response.json().catch(()=>({}));if(!response.ok) throw new Error(data.error || '读取失败');return data;}
function renderHero(user, articles){
  const profile = user.profile || {};
  const tags = Array.isArray(profile.tags) ? profile.tags : [];
  userHero.innerHTML = `<div class="avatar" style="--avatar:${avatarStyle(profile.avatar || '')}"></div><div><h1>${escapeHtml(profile.nickname || user.username || username)}</h1><p class="meta">@${escapeHtml(user.username || username)} · ${escapeHtml(profile.signature || '这个用户暂时没有填写签名。')}</p><div class="tags">${tags.map(tag=>`<span>${escapeHtml(tag)}</span>`).join('') || '<span>暂无标签</span>'}</div></div>`;
  articleCountText.textContent = `共 ${articles.length} 篇公开文章`;
}
async function openDetail(article){
  const full = await fetchJson(`/api/articles?id=${encodeURIComponent(article.id)}`).then(data=>data.article).catch(()=>article);
  article = full || article;
  detailTitle.textContent = article.title || '未命名文章';
  detailMeta.textContent = `${article.category || '随笔'} · @${article.author || username} · ${article.createdAt || ''}`;
  detailContent.style.fontFamily = article.fontFamily || '';
  detailContent.innerHTML = article.content || '<p>这篇文章暂时没有内容。</p>';
  detailModal.classList.add('open');
}
function renderArticles(articles){
  emptyState.hidden = articles.length > 0;
  articleGrid.innerHTML = articles.map(article=>`<article class="article" data-id="${escapeHtml(article.id)}">${renderThumb(article)}<div class="article-body"><small>${escapeHtml(article.category || '随笔')} · ${escapeHtml(article.createdAt || '')}</small><h2>${escapeHtml(article.title || '未命名文章')}</h2><p>${escapeHtml(article.summary || '点击阅读完整文章。')}</p></div></article>`).join('');
  articleGrid.querySelectorAll('[data-id]').forEach(card=>card.addEventListener('click',()=>{const article = articles.find(item=>item.id === card.dataset.id);if(article) openDetail(article);}));
}
async function init(){
  if(!username){articleCountText.textContent='缺少用户名';emptyState.hidden=false;emptyState.textContent='没有指定要查看的用户。';return;}
  try{
    const [profileData, articlesData] = await Promise.all([fetchJson(`/api/users/profile?username=${encodeURIComponent(username)}`), fetchJson('/api/articles')]);
    const articles = (articlesData.articles || []).filter(article=>article.author === username);
    renderHero(profileData.user || { username }, articles);
    renderArticles(articles);
  }catch(error){
    articleCountText.textContent = error.message || '读取失败';
    emptyState.hidden = false;
    emptyState.textContent = '无法读取该用户的公开文章。';
  }
}
document.getElementById('detailClose').addEventListener('click',()=>detailModal.classList.remove('open'));
detailModal.addEventListener('click',event=>{if(event.target===detailModal) detailModal.classList.remove('open');});
init();
</script>
</body>
</html>
