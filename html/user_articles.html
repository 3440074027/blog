<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>用户公开文章</title>
<style>
*{box-sizing:border-box}
:root{--panel:rgba(255,255,255,.115);--line:rgba(255,255,255,.16);--text:rgba(255,255,255,.86);--muted:rgba(255,255,255,.62);--cyan:#8ff7ff;--pink:#ff9ccc}
body{margin:0;min-height:100vh;color:#fff;font-family:"Microsoft YaHei","PingFang SC","Segoe UI",sans-serif;background:radial-gradient(circle at 10% 8%,rgba(255,156,204,.28),transparent 34%),radial-gradient(circle at 86% 12%,rgba(143,247,255,.2),transparent 35%),linear-gradient(135deg,#10142d,#24194d 56%,#121832);overflow-x:hidden}
body::before{content:"";position:fixed;inset:0;pointer-events:none;background-image:radial-gradient(circle,rgba(255,255,255,.24) 0 1px,transparent 1px),radial-gradient(circle,rgba(255,255,255,.15) 0 1px,transparent 1px);background-size:62px 62px,108px 108px;opacity:.45;animation:starsDrift 18s linear infinite}
@keyframes starsDrift{to{background-position:62px 62px,-108px 108px}}
button,input,select{font:inherit}
.page{position:relative;z-index:1;width:min(1280px,calc(100vw - 28px));margin:0 auto;padding:24px 0 44px}
.topbar{display:flex;align-items:center;justify-content:space-between;gap:12px;margin-bottom:18px}
.back,.ghost-btn,.page-btn{min-height:38px;padding:0 15px;border-radius:999px;border:1px solid var(--line);color:#fff;font-weight:900;cursor:pointer;background:rgba(255,255,255,.12);transition:transform .2s,background .2s,box-shadow .2s}
.back:hover,.ghost-btn:hover,.page-btn:hover{transform:translateY(-2px);background:rgba(255,255,255,.18);box-shadow:0 14px 30px rgba(0,0,0,.18)}
.layout{display:grid;grid-template-columns:minmax(280px,340px) minmax(0,1fr);gap:18px;align-items:start}
.sidebar{position:sticky;top:20px;display:grid;gap:14px}
.glass{border:1px solid var(--line);background:var(--panel);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);box-shadow:0 24px 70px rgba(0,0,0,.26),inset 0 1px 0 rgba(255,255,255,.17)}
.profile-card{position:relative;overflow:hidden;padding:22px;border-radius:34px;text-align:center}
.profile-card::before{content:"";position:absolute;inset:-40% -25% auto auto;width:260px;height:260px;border-radius:50%;background:radial-gradient(circle,rgba(143,247,255,.24),transparent 64%)}
.avatar{position:relative;z-index:1;width:118px;height:118px;margin:6px auto 14px;border-radius:50%;background:var(--avatar,linear-gradient(135deg,#7c5cff,#ff8fc7));background-size:cover;background-position:center;border:7px solid rgba(255,255,255,.94);box-shadow:0 22px 48px rgba(0,0,0,.3),0 0 0 8px rgba(255,255,255,.08);overflow:hidden}
.avatar::after{content:"";position:absolute;top:15px;left:18px;width:22px;height:22px;border-radius:50%;background:rgba(255,255,255,.48)}
h1{position:relative;z-index:1;margin:0;font-size:clamp(28px,4vw,42px);line-height:1.04;letter-spacing:-.05em}
.meta{position:relative;z-index:1;margin:9px 0 0;color:var(--muted);font-size:13px;font-weight:850;line-height:1.65}
.tags{display:flex;flex-wrap:wrap;justify-content:center;gap:8px;margin-top:14px}
.tag,.filter-tag{padding:7px 11px;border-radius:999px;border:1px solid rgba(143,247,255,.2);color:#fff;font-size:12px;font-weight:900;background:rgba(143,247,255,.13);cursor:pointer;transition:transform .18s,background .18s}
.tag:hover,.filter-tag:hover,.filter-tag.active{transform:translateY(-2px);background:linear-gradient(135deg,rgba(143,247,255,.22),rgba(255,156,204,.18))}
.stats{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
.stat{padding:12px 8px;border-radius:22px;text-align:center}
.stat strong{display:block;font-size:22px}.stat span{display:block;margin-top:4px;color:var(--muted);font-size:11px;font-weight:900}
.intro{padding:16px;border-radius:26px;color:var(--text);font-size:13px;line-height:1.8}
.main{display:grid;gap:14px}
.toolbar{display:grid;grid-template-columns:minmax(220px,1fr) auto auto;gap:10px;padding:14px;border-radius:30px}
.searchbox{position:relative}
.searchbox input,.toolbar select{width:100%;min-height:42px;border-radius:999px;border:1px solid var(--line);outline:none;color:#fff;background:rgba(255,255,255,.1);padding:0 15px;font-weight:850}
.searchbox input::placeholder{color:rgba(255,255,255,.48)}
.toolbar select option{color:#15172b;background:#fbf6ff}
.tag-panel{display:flex;flex-wrap:wrap;gap:8px;padding:14px;border-radius:28px}
.article-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:14px}
.article{min-height:292px;display:grid;grid-template-rows:150px auto;overflow:hidden;border-radius:30px;cursor:pointer;animation:cardIn .46s cubic-bezier(.22,.08,.28,1) both;transition:transform .22s,background .22s,box-shadow .22s,border-color .22s}
.article:hover{transform:translateY(-6px) scale(1.012);background:rgba(255,255,255,.16);border-color:rgba(255,255,255,.28);box-shadow:0 28px 76px rgba(0,0,0,.34),0 0 26px rgba(143,247,255,.1)}
@keyframes cardIn{from{opacity:0;transform:translateY(18px) scale(.98);filter:blur(8px)}to{opacity:1;transform:none;filter:none}}
.thumb{position:relative;overflow:hidden;background:var(--thumb,linear-gradient(135deg,#7c5cff,#ff8fc7));background-size:cover;background-position:center}
.thumb-slide{position:absolute;inset:0;opacity:0;background:var(--slide);background-size:cover;background-position:center;animation:thumbCarousel var(--duration,8s) infinite;animation-delay:var(--delay,0s)}
.thumb-slide:first-child{opacity:1}
.thumb-dots{position:absolute;left:11px;bottom:10px;z-index:2;display:flex;gap:5px}.thumb-dots span{width:6px;height:6px;border-radius:50%;background:rgba(255,255,255,.76)}
@keyframes thumbCarousel{0%,28%{opacity:1;transform:scale(1)}36%,92%{opacity:0;transform:scale(1.045)}100%{opacity:1;transform:scale(1)}}
.article-body{padding:16px}.article small{color:var(--cyan);font-size:11px;font-weight:950}.article h2{margin:9px 0 8px;font-size:20px;line-height:1.25}.article p{margin:0;color:var(--muted);font-size:13px;line-height:1.7}
.article-tags{display:flex;flex-wrap:wrap;gap:6px;margin-top:12px}.article-tags span{padding:4px 8px;border-radius:999px;background:rgba(255,255,255,.1);font-size:10px;font-weight:900;color:rgba(255,255,255,.76)}
.pager{display:flex;align-items:center;justify-content:center;gap:10px;padding:12px;border-radius:26px;color:var(--muted);font-weight:900}
.page-btn:disabled{opacity:.45;cursor:not-allowed;transform:none}
.empty{padding:36px;border-radius:30px;text-align:center;color:var(--muted)}
.detail{position:fixed;inset:0;z-index:5;display:grid;place-items:center;padding:18px;background:rgba(8,10,26,.58);backdrop-filter:blur(18px);opacity:0;visibility:hidden;pointer-events:none;transition:.24s}
.detail.open{opacity:1;visibility:visible;pointer-events:auto}
.detail-card{width:min(920px,96vw);max-height:90vh;overflow:auto;padding:24px;border-radius:34px;border:1px solid rgba(255,255,255,.22);background:rgba(16,20,48,.95);box-shadow:0 34px 100px rgba(0,0,0,.45)}
.detail-head{display:flex;justify-content:space-between;gap:12px;align-items:flex-start}.detail h2{margin:0;font-size:clamp(26px,4vw,44px)}.close{min-height:34px;padding:0 13px;border-radius:999px;border:1px solid var(--line);color:#fff;background:rgba(255,255,255,.12);cursor:pointer;font-weight:900}
.content{margin-top:16px;padding:18px;border-radius:24px;background:rgba(255,255,255,.09);line-height:1.85;color:var(--text)}.content img{max-width:min(420px,92%);max-height:300px;object-fit:contain;border-radius:18px;margin:8px;border:1px solid rgba(255,255,255,.18)}
@media (max-width:860px){.layout{grid-template-columns:1fr}.sidebar{position:relative;top:auto}.toolbar{grid-template-columns:1fr}.profile-card{text-align:center}}
</style>
</head>
<body>
<main class="page">
  <div class="topbar">
    <button class="back" type="button" onclick="history.length>1?history.back():location.href='../index.html'">返回博客首页</button>
    <span class="meta" id="articleCountText">正在读取公开文章...</span>
  </div>
  <section class="layout">
    <aside class="sidebar">
      <div class="profile-card glass" id="userHero"><div class="avatar"></div><h1>用户公开文章</h1><p class="meta">正在加载用户资料...</p></div>
      <div class="stats">
        <div class="stat glass"><strong id="statArticle">0</strong><span>文章</span></div>
        <div class="stat glass"><strong id="statTag">0</strong><span>标签</span></div>
        <div class="stat glass"><strong id="statImage">0</strong><span>图文</span></div>
      </div>
      <div class="intro glass" id="userIntro">正在整理这个用户的公开信息。</div>
    </aside>
    <section class="main">
      <div class="toolbar glass">
        <div class="searchbox"><input id="articleSearchInput" type="text" name="public_article_search_box" placeholder="搜索标题、摘要、分类、标签..." autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false" data-lpignore="true" data-form-type="other" /></div>
        <select id="articleSortSelect" aria-label="排序方式">
          <option value="new">最新发布</option>
          <option value="old">最早发布</option>
          <option value="title">标题排序</option>
          <option value="image">优先图文</option>
        </select>
        <button class="ghost-btn" id="clearFilterBtn" type="button">清空筛选</button>
      </div>
      <div class="tag-panel glass" id="tagPanel"></div>
      <section class="article-grid" id="articleGrid"></section>
      <section class="empty glass" id="emptyState" hidden>没有找到符合条件的文章。</section>
      <nav class="pager glass">
        <button class="page-btn" id="prevPageBtn" type="button">上一页</button>
        <span id="pageInfo">第 1 / 1 页</span>
        <button class="page-btn" id="nextPageBtn" type="button">下一页</button>
      </nav>
    </section>
  </section>
</main>
<div class="detail" id="detailModal">
  <div class="detail-card">
    <div class="detail-head"><div><div class="meta" id="detailMeta"></div><h2 id="detailTitle">文章标题</h2></div><button class="close" id="detailClose" type="button">关闭</button></div>
    <div class="content" id="detailContent"></div>
  </div>
</div>
<script>
const params = new URLSearchParams(location.search);
const username = params.get('user') || '';
const pageSize = 6;
let allArticles = [];
let filteredArticles = [];
let currentPage = 1;
let activeTag = '全部';
const userHero = document.getElementById('userHero');
const articleGrid = document.getElementById('articleGrid');
const emptyState = document.getElementById('emptyState');
const articleCountText = document.getElementById('articleCountText');
const tagPanel = document.getElementById('tagPanel');
const searchInput = document.getElementById('articleSearchInput');
const sortSelect = document.getElementById('articleSortSelect');
const pageInfo = document.getElementById('pageInfo');
const prevPageBtn = document.getElementById('prevPageBtn');
const nextPageBtn = document.getElementById('nextPageBtn');
const detailModal = document.getElementById('detailModal');
const detailTitle = document.getElementById('detailTitle');
const detailMeta = document.getElementById('detailMeta');
const detailContent = document.getElementById('detailContent');
function escapeHtml(value){return String(value ?? '').replace(/[&<>"']/g,char=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[char]));}
function avatarStyle(value){return value ? `url('${value}')` : 'linear-gradient(135deg,#7c5cff,#ff8fc7)';}
function getTags(article){return Array.from(new Set([article.category, ...(Array.isArray(article.tags)?article.tags:[])].filter(Boolean)));}
function galleryImages(article){const gallery=Array.isArray(article?.gallery)?article.gallery:[];const images=gallery.filter(src=>typeof src==='string'&&src.startsWith('data:image/')).slice(0,5);const thumb=String(article?.thumb||'');if(!images.length&&thumb.startsWith('data:image/')) images.push(thumb);return images;}
function thumbStyle(article){const thumb=String(article?.thumb||'');return thumb.startsWith('data:image/')?`url('${thumb}')`:(thumb||'linear-gradient(135deg,#7c5cff,#ff8fc7)');}
function renderThumb(article){const images=galleryImages(article);if(!images.length)return `<div class="thumb" style="--thumb:${thumbStyle(article)}"></div>`;const duration=Math.max(6,images.length*2.4);return `<div class="thumb" style="--thumb:url('${images[0]}')">${images.map((src,index)=>`<span class="thumb-slide" style="--slide:url('${src}');--duration:${duration}s;--delay:${-(duration/images.length)*index}s"></span>`).join('')}${images.length>1?`<div class="thumb-dots">${images.map(()=>'<span></span>').join('')}</div>`:''}</div>`;}
async function fetchJson(url){const response=await fetch(url,{cache:'no-store'});const data=await response.json().catch(()=>({}));if(!response.ok)throw new Error(data.error||'读取失败');return data;}
function renderHero(user){
  const profile=user.profile||{};
  const tags=Array.isArray(profile.tags)?profile.tags:[];
  userHero.innerHTML=`<div class="avatar" style="--avatar:${avatarStyle(profile.avatar||'')}"></div><h1>${escapeHtml(profile.nickname||user.username||username)}</h1><p class="meta">@${escapeHtml(user.username||username)} · ${escapeHtml(profile.signature||'这个用户暂时没有填写签名。')}</p><div class="tags">${tags.map(tag=>`<button class="tag" type="button" data-profile-tag="${escapeHtml(tag)}">${escapeHtml(tag)}</button>`).join('')||'<span class="tag">暂无标签</span>'}</div>`;
  document.getElementById('userIntro').textContent=profile.intro||'这个用户暂时还没有填写简介，但每一篇公开文章都会在右侧闪闪发光。';
  document.getElementById('statTag').textContent=tags.length;
}
function renderTags(){
  const tags=['全部',...Array.from(new Set(allArticles.flatMap(getTags)))];
  tagPanel.innerHTML=tags.map(tag=>`<button class="filter-tag ${tag===activeTag?'active':''}" type="button" data-tag="${escapeHtml(tag)}">${escapeHtml(tag)}</button>`).join('');
  tagPanel.querySelectorAll('[data-tag]').forEach(btn=>btn.addEventListener('click',()=>{activeTag=btn.dataset.tag||'全部';currentPage=1;applyFilters();}));
}
function applyFilters(){
  const query=searchInput.value.trim().toLowerCase();
  filteredArticles=allArticles.filter(article=>{
    const tags=getTags(article);
    const tagOk=activeTag==='全部'||tags.includes(activeTag);
    const text=[article.title,article.summary,article.category,article.author,...tags].join(' ').toLowerCase();
    return tagOk&&(!query||text.includes(query));
  });
  const sort=sortSelect.value;
  filteredArticles.sort((a,b)=>{
    if(sort==='old')return String(a.createdAt||'').localeCompare(String(b.createdAt||''));
    if(sort==='title')return String(a.title||'').localeCompare(String(b.title||''),'zh-CN');
    if(sort==='image')return galleryImages(b).length-galleryImages(a).length||String(b.createdAt||'').localeCompare(String(a.createdAt||''));
    return String(b.createdAt||'').localeCompare(String(a.createdAt||''));
  });
  renderArticles();
}
function renderArticles(){
  const totalPages=Math.max(1,Math.ceil(filteredArticles.length/pageSize));
  currentPage=Math.min(Math.max(1,currentPage),totalPages);
  const items=filteredArticles.slice((currentPage-1)*pageSize,currentPage*pageSize);
  emptyState.hidden=items.length>0;
  articleGrid.innerHTML=items.map((article,index)=>`<article class="article glass" style="animation-delay:${index*45}ms" data-id="${escapeHtml(article.id)}">${renderThumb(article)}<div class="article-body"><small>${escapeHtml(article.category||'随笔')} · ${escapeHtml(article.createdAt||'')}</small><h2>${escapeHtml(article.title||'未命名文章')}</h2><p>${escapeHtml(article.summary||'点击阅读完整文章。')}</p><div class="article-tags">${getTags(article).slice(0,4).map(tag=>`<span>${escapeHtml(tag)}</span>`).join('')}</div></div></article>`).join('');
  articleGrid.querySelectorAll('[data-id]').forEach(card=>card.addEventListener('click',()=>{const article=allArticles.find(item=>item.id===card.dataset.id);if(article)openDetail(article);}));
  pageInfo.textContent=`第 ${currentPage} / ${totalPages} 页 · ${filteredArticles.length} 篇`;
  prevPageBtn.disabled=currentPage<=1;nextPageBtn.disabled=currentPage>=totalPages;
}
async function openDetail(article){
  const full=await fetchJson(`/api/articles?id=${encodeURIComponent(article.id)}`).then(data=>data.article).catch(()=>article);
  article=full||article;
  detailTitle.textContent=article.title||'未命名文章';
  detailMeta.textContent=`${article.category||'随笔'} · @${article.author||username} · ${article.createdAt||''}`;
  detailContent.style.fontFamily=article.fontFamily||'';
  detailContent.innerHTML=article.content||'<p>这篇文章暂时没有内容。</p>';
  detailModal.classList.add('open');
}
async function init(){
  searchInput.value='';
  if(!username){articleCountText.textContent='缺少用户名';emptyState.hidden=false;emptyState.textContent='没有指定要查看的用户。';return;}
  try{
    const [profileData,articlesData]=await Promise.all([fetchJson(`/api/users/profile?username=${encodeURIComponent(username)}`),fetchJson('/api/articles')]);
    allArticles=(articlesData.articles||[]).filter(article=>article.author===username);
    renderHero(profileData.user||{username});
    document.getElementById('statArticle').textContent=allArticles.length;
    document.getElementById('statImage').textContent=allArticles.filter(article=>galleryImages(article).length).length;
    articleCountText.textContent=`共 ${allArticles.length} 篇公开文章`;
    renderTags();
    applyFilters();
  }catch(error){articleCountText.textContent=error.message||'读取失败';emptyState.hidden=false;emptyState.textContent='无法读取该用户的公开文章。';}
}
let searchTimer=0;
searchInput.addEventListener('input',()=>{clearTimeout(searchTimer);searchTimer=setTimeout(()=>{currentPage=1;applyFilters();},90);});
sortSelect.addEventListener('change',()=>{currentPage=1;applyFilters();});
document.getElementById('clearFilterBtn').addEventListener('click',()=>{searchInput.value='';activeTag='全部';sortSelect.value='new';currentPage=1;renderTags();applyFilters();});
prevPageBtn.addEventListener('click',()=>{currentPage--;renderArticles();window.scrollTo({top:0,behavior:'smooth'});});
nextPageBtn.addEventListener('click',()=>{currentPage++;renderArticles();window.scrollTo({top:0,behavior:'smooth'});});
document.getElementById('detailClose').addEventListener('click',()=>detailModal.classList.remove('open'));
detailModal.addEventListener('click',event=>{if(event.target===detailModal)detailModal.classList.remove('open');});
init();
</script>
</body>
</html>
